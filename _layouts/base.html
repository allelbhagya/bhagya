<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, "Segoe UI", sans-serif;
      background: #fff;
      color: #37352f;
      font-size: 16px;
    }

    .wrapper {
      max-width: 680px;
      margin: 80px auto;
      padding: 0 24px 80px;
    }

    a { color: inherit; }

    .back {
      display: inline-block;
      font-size: 13px;
      color: #9b9b9b;
      text-decoration: none;
      margin-bottom: 48px;
    }

    .back:hover { color: #37352f; }

    .site-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .site-desc {
      color: #9b9b9b;
      font-size: 14px;
      margin-bottom: 48px;
    }

    .post-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .post-item {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 10px 12px;
      border-radius: 6px;
      text-decoration: none;
      color: #37352f;
      transition: background 0.1s;
    }

    .post-item:hover { background: #f1f0ef; }

    .post-date {
      font-size: 12px;
      color: #9b9b9b;
      min-width: 88px;
      flex-shrink: 0;
    }

    .post-heading {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.4px;
    }

    .post-meta {
      font-size: 12px;
      color: #9b9b9b;
      margin-bottom: 40px;
    }

    .post-body { line-height: 1.8; }
    .post-body h2 { font-size: 18px; font-weight: 600; margin: 36px 0 12px; }
    .post-body h3 { font-size: 16px; font-weight: 600; margin: 28px 0 10px; }
    .post-body p { margin-bottom: 16px; }
    .post-body a { text-decoration: underline; }
    .post-body ul, .post-body ol { padding-left: 24px; margin-bottom: 16px; }
    .post-body li { margin-bottom: 4px; }
    .post-body blockquote {
      border-left: 3px solid #e3e2df;
      padding: 4px 20px;
      color: #9b9b9b;
      margin: 20px 0;
    }
    .post-body code {
      background: #f1f0ef;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
    .post-body pre {
      background: #f7f6f3;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
    }
    .post-body pre code { background: none; padding: 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    {{ content }}
  </div>
</body>
</html>
